input {
  # Beats input for Filebeat
  beats {
    port => 5044
    codec => json
  }

  # TCP input for direct log shipping
  tcp {
    port => 5000
    codec => json_lines
  }
}

filter {
  # Parse JSON logs
  if [message] =~ /^\{.*\}$/ {
    json {
      source => "message"
      target => "parsed"
    }
  }

  # Extract common fields
  if [parsed] {
    mutate {
      add_field => {
        "log_level" => "%{[parsed][level]}"
        "service_name" => "%{[parsed][service]}"
        "correlation_id" => "%{[parsed][correlation_id]}"
        "timestamp_log" => "%{[parsed][timestamp]}"
      }
    }
  }

  # Add service name from container labels
  if [container][labels][com.docker.compose.service] {
    mutate {
      add_field => { "service" => "%{[container][labels][com.docker.compose.service]}" }
    }
  }

  # Parse .NET Serilog logs
  if [service] == "api-gateway" {
    grok {
      match => { "message" => "\[%{TIMESTAMP_ISO8601:log_timestamp}\] \[%{LOGLEVEL:level}\] \[%{DATA:correlation_id}\] %{GREEDYDATA:log_message}" }
    }
  }

  # Parse Python logs
  if [service] in ["ai-agent", "lms-scraper", "transcription", "scheduler"] {
    grok {
      match => { "message" => "%{TIMESTAMP_ISO8601:log_timestamp} - %{DATA:logger_name} - %{LOGLEVEL:level} - \[%{DATA:correlation_id}\] - %{GREEDYDATA:log_message}" }
    }
  }

  # Convert log level to lowercase for consistency
  if [level] {
    mutate {
      lowercase => ["level"]
    }
  }

  # Add tags based on log level
  if [level] == "error" or [level] == "fatal" {
    mutate {
      add_tag => ["error"]
    }
  }

  if [level] == "warning" or [level] == "warn" {
    mutate {
      add_tag => ["warning"]
    }
  }

  # Parse timestamp
  if [log_timestamp] {
    date {
      match => ["log_timestamp", "ISO8601", "yyyy-MM-dd HH:mm:ss,SSS"]
      target => "@timestamp"
    }
  }

  # Remove unnecessary fields
  mutate {
    remove_field => ["parsed", "agent", "ecs", "input", "host"]
  }
}

output {
  # Output to Elasticsearch with index lifecycle management
  elasticsearch {
    hosts => ["http://elasticsearch:9200"]
    index => "edupilot-logs-%{+YYYY.MM.dd}"
    
    # Index template for log retention
    template_name => "edupilot-logs"
    template_overwrite => true
  }

  # Debug output (optional, comment out in production)
  # stdout {
  #   codec => rubydebug
  # }
}
