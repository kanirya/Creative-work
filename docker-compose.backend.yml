version: '3.8'

services:
  # Infrastructure
  postgres:
    image: pgvector/pgvector:pg16
    container_name: edupilot-postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./database/schema.sql:/docker-entrypoint-initdb.d/schema.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - edupilot-network

  redis:
    image: redis:7-alpine
    container_name: edupilot-redis
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
    networks:
      - edupilot-network

  # Backend Services
  ai-agent:
    build:
      context: ./services/ai-agent
      dockerfile: Dockerfile
    container_name: edupilot-ai-agent
    environment:
      DATABASE_URL: ${DATABASE_URL}
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      OPENAI_MODEL: ${OPENAI_MODEL}
      OPENAI_EMBEDDING_MODEL: ${OPENAI_EMBEDDING_MODEL}
      LOG_LEVEL: ${LOG_LEVEL}
    ports:
      - "8001:8001"
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8001/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    networks:
      - edupilot-network

  lms-scraper:
    build:
      context: ./services/lms-scraper
      dockerfile: Dockerfile
    container_name: edupilot-lms-scraper
    environment:
      DATABASE_URL: ${DATABASE_URL}
      LOG_LEVEL: ${LOG_LEVEL}
    ports:
      - "8002:8002"
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8002/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    networks:
      - edupilot-network

  transcription:
    build:
      context: ./services/transcription
      dockerfile: Dockerfile
    container_name: edupilot-transcription
    environment:
      DATABASE_URL: ${DATABASE_URL}
      LOG_LEVEL: ${LOG_LEVEL}
    ports:
      - "8003:8003"
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8003/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    networks:
      - edupilot-network

  scheduler:
    build:
      context: ./services/scheduler
      dockerfile: Dockerfile
    container_name: edupilot-scheduler
    environment:
      DATABASE_URL: ${DATABASE_URL}
      SCRAPER_SERVICE_URL: ${SCRAPER_SERVICE_URL}
      TRANSCRIBER_SERVICE_URL: ${TRANSCRIBER_SERVICE_URL}
      LOG_LEVEL: ${LOG_LEVEL}
    ports:
      - "8004:8004"
    depends_on:
      postgres:
        condition: service_healthy
      lms-scraper:
        condition: service_healthy
      transcription:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8004/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    networks:
      - edupilot-network

  api-gateway:
    build:
      context: ./services/api-gateway
      dockerfile: Dockerfile
    container_name: edupilot-api-gateway
    environment:
      DATABASE_URL: ${DATABASE_URL}
      REDIS_URL: ${REDIS_URL}
      JWT_SECRET_KEY: ${JWT_SECRET_KEY}
      JWT_ISSUER: ${JWT_ISSUER}
      JWT_AUDIENCE: ${JWT_AUDIENCE}
      AGENT_SERVICE_URL: ${AGENT_SERVICE_URL}
      SCRAPER_SERVICE_URL: ${SCRAPER_SERVICE_URL}
      TRANSCRIBER_SERVICE_URL: ${TRANSCRIBER_SERVICE_URL}
      SCHEDULER_SERVICE_URL: ${SCHEDULER_SERVICE_URL}
      CORS_ORIGINS: ${CORS_ORIGINS}
      LOG_LEVEL: ${LOG_LEVEL}
    ports:
      - "5000:8080"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      ai-agent:
        condition: service_healthy
      lms-scraper:
        condition: service_healthy
      transcription:
        condition: service_healthy
      scheduler:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    networks:
      - edupilot-network

networks:
  edupilot-network:
    driver: bridge

volumes:
  postgres-data:
  redis-data:
