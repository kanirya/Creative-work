# PostgreSQL Encryption Configuration
# Requirements: 16.2, 12.6 - Data encryption at rest using AES-256

# ============================================================================
# SSL/TLS CONFIGURATION (Data in Transit)
# ============================================================================
# Enable SSL for encrypted connections
ssl = on
ssl_cert_file = '/var/lib/postgresql/server.crt'
ssl_key_file = '/var/lib/postgresql/server.key'
ssl_ca_file = '/var/lib/postgresql/root.crt'

# Require SSL for all connections (production setting)
# ssl_min_protocol_version = 'TLSv1.3'
# ssl_prefer_server_ciphers = on
# ssl_ciphers = 'HIGH:MEDIUM:+3DES:!aNULL'

# ============================================================================
# PASSWORD ENCRYPTION
# ============================================================================
# Use SCRAM-SHA-256 for password authentication (most secure)
password_encryption = scram-sha-256

# ============================================================================
# LOGGING FOR SECURITY AUDIT
# ============================================================================
# Log connections and disconnections
log_connections = on
log_disconnections = on

# Log all DDL statements (CREATE, ALTER, DROP)
log_statement = 'ddl'

# Log duration of queries (for performance monitoring)
log_duration = off
log_min_duration_statement = 1000  # Log queries taking > 1 second

# ============================================================================
# DATA CHECKSUMS
# ============================================================================
# Note: data_checksums must be enabled at initdb time
# Verify with: SHOW data_checksums;
# Enable during cluster initialization: initdb --data-checksums

# ============================================================================
# ENCRYPTION AT REST NOTES
# ============================================================================
# PostgreSQL does not provide built-in transparent data encryption (TDE)
# For production deployment, implement encryption at rest using:
#
# 1. FILE-SYSTEM LEVEL ENCRYPTION (Recommended):
#    - Linux: LUKS (Linux Unified Key Setup)
#      Example: cryptsetup luksFormat /dev/sdb
#    - Windows: BitLocker
#    - Cloud: AWS EBS encryption, Azure Disk Encryption, GCP persistent disk encryption
#
# 2. APPLICATION-LAYER ENCRYPTION (Implemented):
#    - EduPilot.Infrastructure.Services.EncryptionService
#    - AES-256 encryption for sensitive fields
#    - Encryption keys stored in environment variables
#
# 3. COLUMN-LEVEL ENCRYPTION (Available):
#    - pgcrypto extension (enabled in migration)
#    - Functions: encrypt_data(), decrypt_data()
#    - Use for highly sensitive data requiring database-level encryption
#
# 4. BACKUP ENCRYPTION:
#    - Encrypt pg_dump output: pg_dump | gpg --encrypt > backup.sql.gpg
#    - Use encrypted storage for backup files
#
# ============================================================================
# SECURITY BEST PRACTICES
# ============================================================================
# 1. Rotate encryption keys regularly (every 90 days recommended)
# 2. Store encryption keys in secure key management system (AWS KMS, Azure Key Vault, HashiCorp Vault)
# 3. Never commit encryption keys to version control
# 4. Use different keys for different environments (dev, staging, production)
# 5. Implement key rotation without downtime using dual-key encryption
# 6. Monitor encryption_audit_log table for suspicious activity
# 7. Regular security audits and penetration testing
# 8. Implement database access controls and least privilege principle

# ============================================================================
# PERFORMANCE CONSIDERATIONS
# ============================================================================
# Encryption adds computational overhead:
# - Application-layer encryption: ~5-10% CPU overhead
# - File-system encryption: ~2-5% I/O overhead
# - Column-level encryption: ~10-20% query overhead
#
# Optimize by:
# - Encrypting only sensitive fields, not entire database
# - Using hardware AES acceleration (AES-NI on modern CPUs)
# - Caching decrypted data in application layer (with TTL)
# - Using connection pooling to reduce SSL handshake overhead
